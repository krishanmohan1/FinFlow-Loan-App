services:

  # ---------------- ORACLE DB ----------------
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    restart: always
    mem_limit: 3g
    shm_size: 1g
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: [ "CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s system/oracle@localhost:1521/XEPDB1 | grep -q 1 || exit 1" ]
      interval: 30s
      timeout: 30s
      retries: 20
      start_period: 300s
    networks:
      - finflow-network

  # ---------------- RABBITMQ ----------------
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    hostname: rabbitmq
    mem_limit: 512m
    user: root
    command: >
      sh -c "chown -R rabbitmq:rabbitmq /var/lib/rabbitmq &&
             chmod 600 /var/lib/rabbitmq/.erlang.cookie || true &&
             rabbitmq-server"
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - finflow-network

  # ---------------- EUREKA ----------------
  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    restart: always
    mem_limit: 512m
    ports:
      - "8761:8761"
    environment:
      JAVA_OPTS: "-Xmx384m -Xms256m"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health 2>/dev/null | grep -q UP || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks:
      - finflow-network

  # ---------------- AUTH ----------------
  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    restart: always
    mem_limit: 512m
    expose:
      - "9091"
    command: [ "sh", "-c", "sleep 30 && java -Xmx384m -jar app.jar" ]
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: system
      SPRING_DATASOURCE_PASSWORD: oracle
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: mysecretkeymysecretkeymysecretkey12
      JWT_ISSUER: finflow-auth
    depends_on:
      oracle-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - finflow-network

  # ---------------- APPLICATION ----------------
  application-service:
    build:
      context: ./application-service
    container_name: application-service
    restart: always
    mem_limit: 512m
    expose:
      - "9092"
    command: [ "sh", "-c", "sleep 45 && java -Xmx384m -jar app.jar" ]
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: system
      SPRING_DATASOURCE_PASSWORD: oracle
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: mysecretkeymysecretkeymysecretkey12
      JWT_ISSUER: finflow-auth
    depends_on:
      oracle-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      eureka-server:
        condition: service_healthy
    networks:
      - finflow-network

  # ---------------- DOCUMENT ----------------
  document-service:
    build:
      context: ./document-service
    container_name: document-service
    restart: always
    mem_limit: 512m
    expose:
      - "9093"
    command: [ "sh", "-c", "sleep 60 && java -Xmx384m -jar app.jar" ]
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: system
      SPRING_DATASOURCE_PASSWORD: oracle
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: mysecretkeymysecretkeymysecretkey12
      JWT_ISSUER: finflow-auth
    volumes:
      - finflow-uploads:/root/finflow-uploads
    depends_on:
      oracle-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      eureka-server:
        condition: service_healthy
    networks:
      - finflow-network

  # ---------------- ADMIN ----------------
  admin-service:
    build:
      context: ./admin-service
    container_name: admin-service
    restart: always
    mem_limit: 512m
    expose:
      - "9094"
    command: [ "sh", "-c", "sleep 75 && java -Xmx384m -jar app.jar" ]
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: mysecretkeymysecretkeymysecretkey12
      JWT_ISSUER: finflow-auth
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - finflow-network

  # ---------------- API GATEWAY ----------------
  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    restart: always
    mem_limit: 512m
    ports:
      - "9090:9090"
    command: [ "sh", "-c", "sleep 90 && java -Xmx384m -jar app.jar" ]
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: mysecretkeymysecretkeymysecretkey12
      JWT_ISSUER: finflow-auth
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - finflow-network

  # ---------------- ZIPKIN ----------------
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    mem_limit: 512m
    environment:
      JAVA_OPTS: "-Xmx384m"
    ports:
      - "9411:9411"
    restart: always
    networks:
      - finflow-network

networks:
  finflow-network:
    driver: bridge

volumes:
  oracle-data:
  finflow-uploads:
