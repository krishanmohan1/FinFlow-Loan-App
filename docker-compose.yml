services:

  # ---------------- ORACLE DB ----------------
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    restart: always
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
    healthcheck:
      test: [ "CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s system/oracle@localhost:1521/XEPDB1 | grep -q 1 || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 180s # 🔥 increased
    networks:
      - finflow-network

  # ---------------- RABBITMQ ----------------
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    restart: always
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - finflow-network

  # ---------------- EUREKA ----------------
  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    restart: always
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health 2>/dev/null | grep -q UP || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks:
      - finflow-network

  # ---------------- AUTH ----------------
  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    restart: always
    ports:
      - "9091:9091"
    command: [ "sh", "-c", "sleep 60 && java -jar app.jar" ] # 🔥 FIX
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: system
      SPRING_DATASOURCE_PASSWORD: oracle
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: -1
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 60000
    depends_on:
      oracle-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - finflow-network

  # ---------------- APPLICATION ----------------
  application-service:
    build:
      context: ./application-service
    container_name: application-service
    restart: always
    ports:
      - "9092:9092"
    command: [ "sh", "-c", "sleep 60 && java -jar app.jar" ] # 🔥 FIX
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: system
      SPRING_DATASOURCE_PASSWORD: oracle
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: -1
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 60000
    depends_on:
      oracle-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - finflow-network

  # ---------------- DOCUMENT ----------------
  document-service:
    build:
      context: ./document-service
    container_name: document-service
    restart: always
    ports:
      - "9093:9093"
    command: [ "sh", "-c", "sleep 60 && java -jar app.jar" ] # 🔥 FIX
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: system
      SPRING_DATASOURCE_PASSWORD: oracle
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: -1
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 60000
    volumes:
      - finflow-uploads:/root/finflow-uploads
    depends_on:
      oracle-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - finflow-network

  # ---------------- ADMIN ----------------
  admin-service:
    build:
      context: ./admin-service
    container_name: admin-service
    restart: always
    ports:
      - "9094:9094"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - finflow-network

  # ---------------- API GATEWAY ----------------
  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "9090:9090"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - finflow-network

networks:
  finflow-network:
    driver: bridge

volumes:
  finflow-uploads:
