server:
  port: 9091

spring:
  application:
    name: AUTH-SERVICE

  datasource:
    url: jdbc:oracle:thin:@host.docker.internal:1521/XE
    username: capgdb
    password: capgdb
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

logging:
  level:
    com.finflow: DEBUG
    org.springframework: INFO
  file:
    name: logs/auth-service.log
  logback:
    rollingpolicy:
      max-history: 7
      file-name-pattern: logs/auth-service.%d{yyyy-MM-dd}.log