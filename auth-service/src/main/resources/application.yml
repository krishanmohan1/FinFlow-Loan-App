server:
  port: 9091

spring:
  application:
    name: AUTH-SERVICE

  datasource:
    url: jdbc:oracle:thin:@oracle-db:1521/XEPDB1
    username: system
    password: oracle
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      initialization-fail-timeout: -1
      connection-timeout: 60000
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000
      keepalive-time: 60000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect
        temp:
          use_jdbc_metadata_defaults: false

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

logging:
  level:
    com.finflow: DEBUG
    org.springframework: INFO
  file:
    name: /app/logs/auth-service.log
  logback:
    rollingpolicy:
      max-history: 7
      file-name-pattern: /app/logs/auth-service.%d{yyyy-MM-dd}.log

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha