server:
  port: 9091

spring:
  application:
    name: AUTH-SERVICE

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:finflow_auth}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
    username: ${DB_USERNAME:finflow_auth_user}
    password: ${DB_PASSWORD:FinflowAuth@2026!}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initializationFailTimeout: -1
      connectionTimeout: 60000
      maximumPoolSize: 5
      minimumIdle: 1
      idleTimeout: 300000
      keepaliveTime: 60000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

logging:
  level:
    com.finflow: DEBUG
    org.springframework: INFO
  file:
    name: /app/logs/auth-service.log
  logback:
    rollingpolicy:
      max-history: 7
      file-name-pattern: /app/logs/auth-service.%d{yyyy-MM-dd}.log

springdoc:
  api-docs:
    path: /auth/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,tracing

security:
  jwt:
    secret: ${JWT_SECRET:mysecretkeymysecretkeymysecretkey12}
    issuer: ${JWT_ISSUER:finflow-auth}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    refresh-cookie-name: ${JWT_REFRESH_COOKIE_NAME:finflow_refresh_token}
    refresh-cookie-secure: ${JWT_REFRESH_COOKIE_SECURE:false}
