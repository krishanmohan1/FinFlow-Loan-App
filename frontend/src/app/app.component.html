<div class="app-shell">
  <header class="topbar">
    <a class="brand" routerLink="/">
      <span class="brand-mark">F</span>
      <span class="brand-text">
        <strong>FinFlow</strong>
        <small>Loan Management</small>
      </span>
    </a>

    <button
      class="nav-toggle"
      type="button"
      (click)="toggleNav()"
      [attr.aria-expanded]="navOpen()"
      aria-label="Toggle navigation"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="nav-links" [class.open]="navOpen()" aria-label="Main navigation">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeNav()">Home</a>
      <a routerLink="/" fragment="products" (click)="closeNav()">Products</a>
      <a routerLink="/" fragment="how-it-works" (click)="closeNav()">How it works</a>
      @if (auth.isAuthenticated()) {
        <a routerLink="/dashboard" routerLinkActive="active" (click)="closeNav()">My Dashboard</a>
        @if (auth.isAdmin()) {
          <a routerLink="/admin" routerLinkActive="active" (click)="closeNav()">Admin Panel</a>
        }
      }
    </nav>

    <div class="nav-actions" [class.open]="navOpen()">
      @if (auth.isAuthenticated()) {
        <div class="identity">
          <span class="identity-name">{{ auth.username() }}</span>
          <span class="identity-role">{{ auth.role() }}</span>
        </div>
        <button class="ghost-button" type="button" (click)="auth.logout(); closeNav()">Sign out</button>
      } @else {
        <a class="ghost-button" routerLink="/login" (click)="closeNav()">Sign in</a>
        <a class="solid-button" routerLink="/register" (click)="closeNav()">Apply now</a>
      }
    </div>
  </header>

  <main>
    <router-outlet />
  </main>
</div>
