server:
  port: 9090

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**
              filters:
                - name: JwtGatewayFilter

            - id: application-service
              uri: lb://APPLICATION-SERVICE
              predicates:
                - Path=/application/**
              filters:
                - name: JwtGatewayFilter

            - id: document-service
              uri: lb://DOCUMENT-SERVICE
              predicates:
                - Path=/document/**
              filters:
                - name: JwtGatewayFilter

            - id: admin-service
              uri: lb://ADMIN-SERVICE
              predicates:
                - Path=/admin/**
              filters:
                - name: JwtGatewayFilter

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

logging:
  level:
    com.finflow: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework: INFO

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,tracing