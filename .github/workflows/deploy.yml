name: Deploy FinFlow Frontend to EC2

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 📥 Pull latest code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🟢 Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # 📦 Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      # 🏗️ Build Angular frontend
      - name: Build Angular app
        working-directory: ./frontend
        run: npm run build

      # 📂 Copy built files to EC2
      - name: Upload build files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 3.19.105.168
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "frontend/dist/finflow-frontend/browser/*"
          target: "/home/ubuntu/frontend-deploy"

      # 🚀 Deploy on EC2
      - name: Deploy to Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 3.19.105.168
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo rm -rf /var/www/html/*
            sudo cp -r /home/ubuntu/frontend-deploy/browser/* /var/www/html/ || sudo cp -r /home/ubuntu/frontend-deploy/* /var/www/html/
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html
            sudo systemctl restart nginx

      # ✅ Success message
      - name: Deployment Complete
        run: echo "FinFlow frontend deployed successfully!"
