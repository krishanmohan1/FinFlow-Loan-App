name: Deploy FinFlow Frontend to EC2

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── Pull latest code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup Node.js (must match Angular 20 requirement) ─────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── Install dependencies ───────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      # ── Inject production API URL from GitHub secret ───────────────────────
      # EC2_API_URL should be set in GitHub → Settings → Secrets
      # Example value: http://13.233.xx.xx:9090
      - name: Inject production API base URL
        working-directory: ./frontend
        run: |
          API_URL="${{ secrets.EC2_API_URL }}"
          if [ -z "$API_URL" ]; then
            echo "WARNING: EC2_API_URL secret is not set. Using empty string."
            API_URL=""
          fi
          sed -i "s|\${API_BASE_URL}|${API_URL}|g" src/environments/environment.prod.ts
          echo "Injected API URL: $API_URL"

      # ── Build Angular app (production) ────────────────────────────────────
      - name: Build Angular app
        working-directory: ./frontend
        run: npm run build

      # ── Upload built files to EC2 ─────────────────────────────────────────
      # Angular 20 outputs to dist/finflow-frontend/browser/
      - name: Upload build files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "frontend/dist/finflow-frontend/browser/"
          target: "/home/ubuntu/frontend-deploy"
          strip_components: 4

      # ── Write nginx config and deploy ─────────────────────────────────────
      - name: Deploy to Nginx on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            # Write nginx site config (handles Angular client-side routing)
            sudo tee /etc/nginx/sites-available/finflow > /dev/null << 'NGINX_CONF'
            server {
                listen 80;
                server_name _;

                root /var/www/finflow;
                index index.html;

                # Gzip compression
                gzip on;
                gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

                # Cache static assets
                location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }

                # Angular routing — all unknown paths serve index.html
                location / {
                    try_files $uri $uri/ /index.html;
                }
            }
            NGINX_CONF

            # Enable site
            sudo ln -sf /etc/nginx/sites-available/finflow /etc/nginx/sites-enabled/finflow
            sudo rm -f /etc/nginx/sites-enabled/default

            # Deploy files
            sudo mkdir -p /var/www/finflow
            sudo rm -rf /var/www/finflow/*
            sudo cp -r /home/ubuntu/frontend-deploy/* /var/www/finflow/
            sudo chown -R www-data:www-data /var/www/finflow
            sudo chmod -R 755 /var/www/finflow

            # Test and reload nginx
            sudo nginx -t
            sudo systemctl reload nginx

            echo "FinFlow deployed successfully to /var/www/finflow"

      # ── Done ──────────────────────────────────────────────────────────────
      - name: Deployment complete
        run: |
          echo "✅ FinFlow frontend deployed to EC2"
          echo "   Host: ${{ secrets.EC2_HOST }}"
