name: Deploy FinFlow Frontend to EC2

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Inject production API base URL
        working-directory: ./frontend
        run: |
          API_URL="${{ secrets.EC2_API_URL }}"
          if [ -z "$API_URL" ]; then
            echo "ERROR: EC2_API_URL secret is missing."
            exit 1
          fi
          sed -i "s|\${API_BASE_URL}|${API_URL}|g" src/environments/environment.prod.ts

      - name: Build Angular app
        working-directory: ./frontend
        run: npm run build -- --configuration production

      - name: Upload build files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "frontend/dist/finflow-frontend/browser/*"
          target: "/home/ubuntu/frontend-deploy"
          strip_components: 4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd ~/FinFlow-Loan-App
            docker compose up -d --build

            sudo tee /etc/nginx/sites-available/finflow > /dev/null << 'NGINX_CONF'
            server {
                listen 80;
                server_name _;
                root /var/www/finflow;
                index index.html;

                location /api/ {
                    proxy_pass http://localhost:9090/;
                }

                location / {
                    try_files $uri $uri/ /index.html;
                }
            }
            NGINX_CONF

            sudo ln -sf /etc/nginx/sites-available/finflow /etc/nginx/sites-enabled/finflow
            sudo rm -f /etc/nginx/sites-enabled/default

            sudo mkdir -p /var/www/finflow
            sudo rm -rf /var/www/finflow/*
            sudo cp -r /home/ubuntu/frontend-deploy/* /var/www/finflow/
            sudo chown -R www-data:www-data /var/www/finflow
            sudo chmod -R 755 /var/www/finflow

            sudo nginx -t
            sudo systemctl restart nginx