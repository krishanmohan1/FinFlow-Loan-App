server:
  port: 9092

spring:
  application:
    name: APPLICATION-SERVICE

  datasource:
    url: jdbc:oracle:thin:@localhost:1521/XE
    username: capgdb
    password: capgdb
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    com.finflow: DEBUG
    org.springframework: INFO