server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: eureka-server
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0
    enable-self-preservation: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.finflow: DEBUG
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
    org.springframework: INFO
  file:
    name: /app/logs/eureka-server.log
  logback:
    rollingpolicy:
      max-history: 7
      file-name-pattern: /app/logs/eureka-server.%d{yyyy-MM-dd}.log
