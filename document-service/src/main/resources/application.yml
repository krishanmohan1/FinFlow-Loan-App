server:
  port: 9093

spring:
  application:
    name: DOCUMENT-SERVICE

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:finflow_document}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
    username: ${DB_USERNAME:finflow_document_user}
    password: ${DB_PASSWORD:FinflowDocument@2026!}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initializationFailTimeout: -1
      connectionTimeout: 60000
      maximumPoolSize: 5
      minimumIdle: 1
      idleTimeout: 300000
      keepaliveTime: 60000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

logging:
  level:
    com.finflow: DEBUG
    org.springframework: INFO
  file:
    name: /app/logs/document-service.log
  logback:
    rollingpolicy:
      max-history: 7
      file-name-pattern: /app/logs/document-service.%d{yyyy-MM-dd}.log

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,tracing

springdoc:
  api-docs:
    path: /document/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
