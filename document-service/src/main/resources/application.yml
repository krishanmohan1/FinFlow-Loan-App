server:
  port: 9093

spring:
  application:
    name: DOCUMENT-SERVICE

  datasource:
    url: jdbc:oracle:thin:@//oracle-db:1521/XEPDB1
    username: system
    password: oracle
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      initializationFailTimeout: -1
      connectionTimeout: 60000
      maximumPoolSize: 5
      minimumIdle: 1
      idleTimeout: 300000
      keepaliveTime: 60000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect
        temp:
          use_jdbc_metadata_defaults: false

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

logging:
  level:
    com.finflow: DEBUG
    org.springframework: INFO
  file:
    name: /app/logs/document-service.log
  logback:
    rollingpolicy:
      max-history: 7
      file-name-pattern: /app/logs/document-service.%d{yyyy-MM-dd}.log