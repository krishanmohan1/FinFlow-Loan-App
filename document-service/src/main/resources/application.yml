server:
  port: 9093

spring:
  application:
    name: DOCUMENT-SERVICE

  datasource:
    url: jdbc:oracle:thin:@host.docker.internal:1521/XE
    username: capgdb
    password: capgdb
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

logging:
  level:
    com.finflow: DEBUG
    org.springframework: INFO
  file:
    name: logs/document-service.log
  logback:
    rollingpolicy:
      max-history: 7
      file-name-pattern: logs/document-service.%d{yyyy-MM-dd}.log